program: src/train.py
command:
  - ${env}
  - python3
  - ${program}
  - ${args}
method: grid
parameters:
  learning_rate:
    value: 0.1 # High learning rate to trigger dead neurons
  activation:
    values: ["relu", "tanh"]
  hidden_size:
    value: [128, 128, 128]
  optimizer:
    value: "rmsprop"